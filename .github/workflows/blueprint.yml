name: Blueprint and documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering from the GitHub Actions interface.

# Cancel previous runs if a new commit is pushed to the same PR or branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Allow the job to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project
    # Blueprint-only path is ~6–10 min (lake build w/ cache ~3.5 min + leanblueprint ~2.5 min +
    # deploy). 60 min is generous headroom yet fails fast if the API-doc build ever creeps back in.
    timeout-minutes: 60
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags.

      - name: Build project
        uses: leanprover/lean-action@434f25c2f80ded67bba02502ad3a86f25db50709 # 2025-07-02
        with:
          build: true
          # Style linting (Mathlib's `linter.mathlibStandardSet`) is enforced by the build itself:
          # lakefile.toml promotes warnings to errors on the `Oseledets` lib, so a lint regression
          # already fails this build. (`lint:` here is lean-action's separate environment linter.)
          lint: false

      # Create/configure the GitHub Pages site (source = "GitHub Actions") *before* deploying.
      # Without this the repo has no Actions-backed Pages site (`GET /pages` returns 404), so the
      # `actions/deploy-pages` step inside docgen-action fails with "Creating Pages deployment
      # failed". `enablement: true` provisions it via the API using the `pages: write` token, which
      # is the one part of the fix that does not require touching repository settings by hand.
      # Only runs on the same events that deploy, so PRs stay pure dry runs.
      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true

      - name: Compile blueprint and documentation
        uses: leanprover-community/docgen-action@deed0cdc44dd8e5de07a300773eb751d33e32fc8 # 2025-10-26
        with:
          blueprint: true
          # Skip the doc-gen4 API reference: it rebuilds HTML for the ENTIRE Mathlib import
          # closure (~22k modules, ~4 s each) from scratch every run — >2 h, which blows the job
          # timeout so NOTHING (not even the ~2.5 min blueprint) ever deployed to Pages. The
          # blueprint is this project's documentation deliverable; full-Mathlib API docs are
          # redundant with the official Mathlib doc site.
          #
          # NB: we set the DEPRECATED `api_docs` (underscore), not `api-docs`. In this action
          # version (deed0cd, 2025-10-26) the deprecation shim `dist/deprecation.js` computes
          # `API_DOCS = getInputWithDeprecation("api-docs","api_docs") || "true"`, and the
          # hyphenated `api-docs: false` does not reach it (verified: the doc-gen4 build still ran
          # and hit the timeout), so `API_DOCS` fell back to "true". The underscore input feeds the
          # shim's `oldName` path directly and correctly yields `API_DOCS=false`.
          api_docs: false
          homepage: home_page
          # Only publish to GitHub Pages from `main` (on push or a manual re-deploy via
          # workflow_dispatch). On PRs and other branches the blueprint/docs are still built as a
          # dry run, but nothing is deployed.
          deploy: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}

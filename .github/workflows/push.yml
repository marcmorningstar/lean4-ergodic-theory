name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Don't cancel CI on main so every commit stays green. PR runs are
# cancellable; see push_pr.yml.

permissions:
  contents: read

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build
    timeout-minutes: 120
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build project
        uses: leanprover/lean-action@v1
        with:
          build: true
          lint: false

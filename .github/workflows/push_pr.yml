name: PR build

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build
    timeout-minutes: 120
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build project
        uses: leanprover/lean-action@v1
        with:
          build: true
          # Style linting (Mathlib's `linter.mathlibStandardSet`) is enforced by the build itself:
          # lakefile.toml sets `warningAsError` on the `ErgodicTheory` lib, so any lint regression fails
          # this `lake build`. (`lint:` here is lean-action's separate environment linter / `#lint`.)
          lint: false

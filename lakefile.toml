name = "ErgodicTheory"
version = "1.0.0"
description = "A Lean 4 + Mathlib formalization of the Oseledets multiplicative ergodic theorem (MET), with a leanblueprint and doc-gen4 documentation."
keywords = ["ergodic-theory", "dynamical-systems", "lyapunov-exponents", "oseledets", "entropy", "quantum-information", "mathlib", "mathematics"]
homepage = "https://marcmorningstar.github.io/lean4-ergodic-theory/"
license = "Apache-2.0"
testDriver = "AxiomAudit"
defaultTargets = ["ErgodicTheory", "AxiomAudit"]

[leanOptions]
autoImplicit = false

# Pinned to the exact revision recorded in lake-manifest.json so it stays
# coupled to lean-toolchain (v4.30.0-rc2) and the prebuilt Mathlib cache.
# Bump this rev (and re-run `lake update`) deliberately when upgrading.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "34f7a6cd150fd7a166958d989d5abab56e9e3d15"

# `checkdecls` provides the `lake exe checkdecls` executable used by the blueprint
# CI (and `leanblueprint checkdecls` locally) to verify that every `\lean{...}`
# declaration named in `blueprint/` actually exists in the built environment.
# It is a tiny standalone package (no Mathlib dependency).
[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[lean_lib]]
name = "ErgodicTheory"
# Enforce Mathlib's standard style-linter set on the upstreamable library at build time, and
# promote warnings to errors so a lint regression fails `lake build` (and hence CI) rather than
# merely warning. Passed as raw lean args (not `[leanOptions]` keys) so the `weak.` prefix —
# required because the option is only registered once Mathlib is imported — is not absorbed into
# the guillemet-quoted dotted option name. The `AxiomAudit` test lib is deliberately NOT linted
# (it uses `#print axioms`/`#guard_msgs`, which the `hashCommand` linter forbids).
moreLeanArgs = ["-Dweak.linter.mathlibStandardSet=true", "-DwarningAsError=true"]

# Axiom-audit regression check, kept OUT of the upstreamable `ErgodicTheory` library
# (Mathlib disallows `#print axioms` in library source). Built on every `lake build`
# (a default target) so the guard still fails CI on axiom drift.
[[lean_lib]]
name = "AxiomAudit"
srcDir = "test"
